# OpenDC CLI user-interface configuration.
#
# These values control the CLI's presentation: strings, symbols, colours and table headers. Edit this
# file (or ship a modified copy) to re-skin or re-label the CLI without touching code. At runtime an
# external override file may be layered on top via the OPENDC_UI_CONFIG environment variable or the
# -Dopendc.ui.config system property; keys it sets win, the rest fall back to the values here. Any
# missing or malformed value falls back to the built-in default, so an incomplete override never
# breaks the CLI.

# --- Theme (Mordant color roles) -------------------------------------------------------------
# Blank inherits the framework default. Override with an ANSI colour name (e.g. brightBlue, green,
# red, gray) or a hex string (e.g. #ff8800). An unrecognised value is ignored (default is kept).
theme.info=
theme.muted=
theme.success=
theme.danger=

# --- Symbols ----------------------------------------------------------------------------------
symbol.success=✓
symbol.failure=✗
symbol.bullet=•
symbol.dash=—
symbol.times=×
bar.complete=█
bar.pending=━

# --- Progress bar wording ---------------------------------------------------------------------
# Suffix after the completed-task count.
bar.completedSuffix=\ tasks

# --- Dashboard panels & fact labels -----------------------------------------------------------
panel.simulation.title=simulation
panel.progress.title=progress
panel.logs.title=logs
label.experiment=experiment
label.scenarios=scenarios
label.runs=runs
label.topologies=topologies
label.workloads=workloads
label.parallelism=parallelism
label.policies=policies
label.tasks=tasks
label.output=output
label.input=input

# --- Table headers (comma-separated, in order) ------------------------------------------------
header.summary=Scenario,Seed,Tasks,Completed,Terminated,Mean CPU,Energy [kWh],Carbon [kg]
header.topology=Cluster,Host,Count,CPU,Memory,GPU

# --- Timing -----------------------------------------------------------------------------------
# How often (ms) the live dashboard polls progress and redraws.
timing.pollIntervalMs=100

# --- Log panel --------------------------------------------------------------------------------
# How many recent log lines the dashboard keeps, and the level it surfaces (WARN or INFO).
logging.ringCapacity=500
logging.captureLevel=WARN
