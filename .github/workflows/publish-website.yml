# Workflow for publishing the artifacts once a GitHub release is published
name: Publish website

on:
  push:
    branches: [ gh-pages ]

jobs:
  push-website:
    name: Push website to DockerHub
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare
        id: prep
        run: |
          DOCKER_IMAGE=ghcr.io/atlarge-research/opendc-website
          VERSION=3.0-SNAPSHOT
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "tags=${DOCKER_IMAGE}:${VERSION}" >> $GITHUB_OUTPUT
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: site
          push: true
          file: site/Dockerfile
          tags: ${{ steps.prep.outputs.tags }}
