name: Publish website docker image

on:
  push:
    tags: ['*']
  workflow_run:
    workflows: ["Build"]
    types:
      - completed
    branches:
      - gh-pages
  workflow_dispatch:

jobs:
  push-website:
    name: Push website to DockerHub
    runs-on: ubuntu-22.04
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
    steps:
      - name: Prepare
        id: prep
        run: |
          DOCKER_IMAGE=ghcr.io/atlarge-research/opendc-website
          VERSION=website-1.0.0
          echo "tags=${DOCKER_IMAGE}:${VERSION},${DOCKER_IMAGE}:latest" >> $GITHUB_OUTPUT
      - name: Checkout
        uses: actions/checkout@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: ./site
          push: true
          tags: ${{ steps.prep.outputs.tags }}
