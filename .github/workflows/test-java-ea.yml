name: Test Java EA release
on:
  schedule:
    - cron: 0 0 * * 0 # weekly
  workflow_dispatch:

jobs:
  java-ea:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21-ea
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-disabled: true
          gradle-version: release-candidate
          arguments: build
